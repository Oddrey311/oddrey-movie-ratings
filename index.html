<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Rankings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 0; margin: 0; }
        .controls { position: sticky; top: 0; background: #1a1a1a; padding: 20px; z-index: 100; border-bottom: 2px solid #e50914; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 180px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .movie-card { background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .movie-card:hover { border-color: #e50914; transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; background: #2a2a2a; }
        .info { padding: 10px; }
        .score-tag { background: #e50914; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 0.85rem; }
        h3 { font-size: 0.95rem; margin: 5px 0 10px 0; height: 2.4em; overflow: hidden; }
        
        /* ERROR MESSAGE BOX */
        #statusMessage { background: #721c24; color: #f8d7da; padding: 10px; display: none; margin: 20px; border-radius: 5px; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; overflow-y: auto; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 15px; max-width: 850px; width: 90%; display: flex; flex-wrap: wrap; gap: 30px; position: relative; border: 1px solid #444; text-align: left; }
        .modal-left { flex: 0 0 250px; }
        .modal-left img { width: 100%; border-radius: 10px; }
        .modal-right { flex: 1; min-width: 300px; }
        .breakdown { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-row { margin-bottom: 8px; }
        .stat-label { font-size: 0.75rem; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 3px; }
        .stat-bar-bg { background: #333; height: 6px; border-radius: 3px; }
        .stat-bar-fill { background: #e50914; height: 100%; border-radius: 3px; }
        .review-box { margin-top: 20px; padding: 15px; background: #222; border-radius: 8px; border-left: 4px solid #e50914; font-style: italic; color: #ddd; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #888; }
        #sentinel { padding: 40px; color: #555; }
    </style>
</head>
<body>

    <div id="statusMessage"></div>

    <div class="controls">
        <input type="text" id="search" placeholder="Search movies...">
        <select id="studioFilter">
            <option value="all">All Studios</option>
            <option value="1">Marvel</option><option value="2">DC</option><option value="3">Disney</option>
            <option value="4">Pixar</option><option value="5">Universal</option><option value="6">Dream Works</option>
            <option value="7">Illumination</option><option value="8">Warner Bros</option><option value="9">New Line Cinema</option>
            <option value="10">Paramount</option><option value="11">Miramax</option><option value="12">Sony Pictures</option>
            <option value="13">MGM</option><option value="14">Lionsgate</option><option value="15">Focus Features</option>
            <option value="16">Lucas film</option><option value="17">20th Century</option><option value="18">Searchlight</option>
            <option value="19">20th Century Fox / Marvel</option><option value="20">Nickelodeon</option><option value="21">Toei Animation</option>
            <option value="22">Independant</option><option value="23">Columbia Pictures</option><option value="24">A24</option>
            <option value="25">Apple Studios</option>
        </select>
        <select id="sort">
            <option value="recent">Most Recent</option>
            <option value="high">Highest Rated</option>
            <option value="az">A-Z</option>
        </select>
    </div>

    <div id="container" class="movie-grid"></div>
    <div id="sentinel">Loading content...</div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-left"><img id="modalImg" src=""><div style="margin-top:20px;text-align:center;"><span id="modalScore" style="font-size:2.5rem;font-weight:bold;color:#e50914;"></span><br><small>SCORE / 100</small></div></div>
            <div class="modal-right">
                <h2 id="modalTitle" style="margin-top:0;"></h2>
                <p id="modalMeta" style="color:#888; border-bottom:1px solid #333; padding-bottom:10px;"></p>
                <div id="breakdownArea"><strong>Breakdown</strong><div class="breakdown" id="modalBreakdown"></div></div>
                <div id="modalReview" class="review-box" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MzNjZmYyNDFlMzBiNDFiYzdmMTZhZTllYzRkOTdhOSIsIm5iZiI6MTc3NDA2MzY2NC40MDksInN1YiI6IjY5YmUxMDMwZjVkMGNkMmNiODcwODc0MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.6v1eQGdH2fRMCICnH9sbIoVRFpQ2Xy5fgWwbcEL1hII";
        
        const studioMap = { "1":"Marvel", "2":"DC", "3":"Disney", "4":"Pixar", "5":"Universal", "6":"Dream Works", "7":"Illumination", "8":"Warner Bros", "9":"New Line Cinema", "10":"Paramount", "11":"Miramax", "12":"Sony Pictures", "13":"MGM", "14":"Lionsgate", "15":"Focus Features", "16":"Lucas film", "17":"20th Century", "18":"Searchlight", "19":"20th Century Fox / Marvel", "20":"Nickelodeon", "21":"Toei Animation", "22":"Independant", "23":"Columbia Pictures", "24":"A24", "25":"Apple Studios" };

        let allMovies = [];
        let reviews = {};
        let filteredList = [];
        let displayedMovies = [];
        let currentIndex = 0;

        function logError(msg) {
            const el = document.getElementById('statusMessage');
            el.innerHTML += `<div>⚠️ ${msg}</div>`;
            el.style.display = 'block';
        }

        // 1. LOAD REVIEWS (Handle missing headers)
        Papa.parse("Movie List.xlsx - Reviews.csv", {
            download: true,
            header: false, // Set to false because your file has no header row
            error: (err) => logError("Could not find Reviews.csv"),
            complete: function(res) {
                res.data.forEach(row => {
                    if(row[0]) reviews[row[0].trim().toLowerCase()] = row[1];
                });
                loadMainData();
            }
        });

        // 2. LOAD DATA
        function loadMainData() {
            Papa.parse("Movie List.xlsx - Detailed Rankings.csv", {
                download: true,
                header: true,
                error: (err) => logError("Could not find Detailed Rankings.csv. Check the filename!"),
                complete: function(results) {
                    let data = results.data.filter(r => r.Title || r.Movie);
                    if (data.length === 0) { logError("The CSV file seems to be empty."); return; }
                    
                    const uniqueMap = new Map();
                    data.forEach(row => {
                        const t = (row.Title || row.Movie || "").trim();
                        if(t) uniqueMap.set(t.toLowerCase(), row);
                    });
                    allMovies = Array.from(uniqueMap.values());
                    applyFilters();
                    setupInfiniteScroll();
                }
            });
        }

        function renderStat(label, val) {
            if(!val || val == 0) return "";
            return `<div class="stat-row"><div class="stat-label"><span>${label}</span><span>${val}</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${val}%"></div></div></div>`;
        }

        async function loadNextBatch() {
            const next = filteredList.slice(currentIndex, currentIndex + 12);
            if (next.length === 0) { document.getElementById('sentinel').innerText = "All movies loaded."; return; }
            
            const withPosters = await Promise.all(next.map(async (row) => {
                const title = row.Title || row.Movie;
                const poster = await fetchPoster(title);
                return { ...row, poster };
            }));
            
            displayedMovies = [...displayedMovies, ...withPosters];
            currentIndex += 12;
            renderGrid();
        }

        async function fetchPoster(title) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}`, {
                    headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
                });
                const d = await res.json();
                return d.results?.[0] ? `https://image.tmdb.org/t/p/w500${d.results[0].poster_path}` : "https://via.placeholder.com/500x750?text=No+Poster";
            } catch(e) { return "https://via.placeholder.com/500x750?text=Error"; }
        }

        function renderGrid() {
            document.getElementById('container').innerHTML = displayedMovies.map((m, i) => `
                <div class="movie-card" onclick="openModal(${i})">
                    <img src="${m.poster}" loading="lazy">
                    <div class="info">
                        <small style="color:#888">${studioMap[m.Studio] || 'Other'}</small>
                        <h3>${m.Title || m.Movie}</h3>
                        <span class="score-tag">${Math.round(m['Final Rating'] || m.Rating || 0)}/100</span>
                    </div>
                </div>`).join('');
        }

        function openModal(i) {
            const m = displayedMovies[i];
            const t = m.Title || m.Movie;
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalImg').src = m.poster;
            document.getElementById('modalScore').innerText = Math.round(m['Final Rating'] || m.Rating || 0);
            document.getElementById('modalMeta').innerText = `${studioMap[m.Studio] || 'Other'} • Watched: ${m.Date || 'N/A'}`;
            
            const stats = renderStat("Story", m.Story) + renderStat("Character", m.Character) + renderStat("Visuals", m.Visuals);
            document.getElementById('modalBreakdown').innerHTML = stats || "No breakdown available.";
            
            const revBox = document.getElementById('modalReview');
            const revTxt = reviews[t.trim().toLowerCase()];
            if(revTxt) { revBox.innerText = `"${revTxt}"`; revBox.style.display = 'block'; } 
            else { revBox.style.display = 'none'; }
            
            document.getElementById('movieModal').style.display = 'flex';
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const studio = document.getElementById('studioFilter').value;
            filteredList = allMovies.filter(m => (m.Title || m.Movie).toLowerCase().includes(term) && (studio === "all" || m.Studio === studio));
            currentIndex = 0; displayedMovies = []; document.getElementById('container').innerHTML = ""; loadNextBatch();
        }

        function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
        window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); };

        function setupInfiniteScroll() {
            new IntersectionObserver((entries) => { if(entries[0].isIntersecting) loadNextBatch(); }, {threshold: 0.1}).observe(document.getElementById('sentinel'));
        }

        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('studioFilter').addEventListener('change', applyFilters);
        document.getElementById('sort').addEventListener('change', () => {
            const s = document.getElementById('sort').value;
            if(s === "high") allMovies.sort((a,b) => (b['Final Rating'] || b.Rating) - (a['Final Rating'] || a.Rating));
            if(s === "az") allMovies.sort((a,b) => (a.Title || a.Movie).localeCompare(b.Title || b.Movie));
            applyFilters();
        });
    </script>
</body>
</html>
