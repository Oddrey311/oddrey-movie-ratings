<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Rankings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 0; margin: 0; }
        .controls { position: sticky; top: 0; background: #1a1a1a; padding: 20px; z-index: 100; border-bottom: 2px solid #e50914; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 160px; outline: none; }
        input:focus { border-color: #e50914; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .movie-card { background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; }
        .movie-card:hover { border-color: #e50914; transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; background: #2a2a2a; }
        .info { padding: 10px; flex-grow: 1; }
        .score-tag { background: #e50914; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 0.85rem; }
        h3 { font-size: 0.95rem; margin: 5px 0 10px 0; height: 2.4em; overflow: hidden; }

        /* MODAL STYLES */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; overflow-y: auto; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 15px; max-width: 850px; width: 90%; display: flex; flex-wrap: wrap; gap: 30px; position: relative; border: 1px solid #444; text-align: left; }
        .modal-left { flex: 0 0 250px; text-align: center; }
        .modal-left img { width: 100%; border-radius: 10px; }
        .modal-right { flex: 1; min-width: 300px; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #888; }
        .stat-bar-bg { background: #333; height: 6px; border-radius: 3px; margin: 5px 0 10px 0; }
        .stat-bar-fill { background: #e50914; height: 100%; border-radius: 3px; }

        #sentinel { padding: 40px; color: #555; font-style: italic; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="search" placeholder="Search titles...">
        
        <select id="yearFilter">
            <option value="all">All Years</option>
        </select>

        <select id="studioFilter">
            <option value="all">All Studios</option>
            <option value="1">Marvel</option><option value="2">DC</option><option value="3">Disney</option>
            <option value="4">Pixar</option><option value="5">Universal</option><option value="8">Warner Bros</option>
            <option value="12">Sony</option><option value="24">A24</option><option value="25">Apple</option>
        </select>

        <select id="sort">
            <option value="recent">Most Recent</option>
            <option value="high">Highest Rated</option>
            <option value="az">A-Z</option>
        </select>
    </div>

    <div id="container" class="movie-grid"></div>
    <div id="sentinel">Loading your journey...</div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <img id="modalImg" src="">
                <h1 id="modalScore" style="color:#e50914; margin-bottom:0;"></h1>
                <small>FINAL RATING</small>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle" style="margin-top:0;"></h2>
                <p id="modalMeta" style="color:#888; border-bottom:1px solid #333; padding-bottom:10px;"></p>
                <div id="breakdownSection">
                    <strong>Breakdown</strong>
                    <div id="modalBreakdown"></div>
                </div>
                <div id="modalReview" style="margin-top:20px; padding:15px; background:#222; border-radius:8px; font-style:italic; display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MzNjZmYyNDFlMzBiNDFiYzdmMTZhZTllYzRkOTdhOSIsIm5iZiI6MTc3NDA2MzY2NC40MDksInN1YiI6IjY5YmUxMDMwZjVkMGNkMmNiODcwODc0MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.6v1eQGdH2fRMCICnH9sbIoVRFpQ2Xy5fgWwbcEL1hII";
        
        const studioMap = { "1":"Marvel", "2":"DC", "3":"Disney", "4":"Pixar", "5":"Universal", "6":"Dream Works", "7":"Illumination", "8":"Warner Bros", "9":"New Line Cinema", "10":"Paramount", "11":"Miramax", "12":"Sony Pictures", "13":"MGM", "14":"Lionsgate", "15":"Focus Features", "16":"Lucas film", "17":"20th Century", "18":"Searchlight", "19":"20th Century Fox / Marvel", "20":"Nickelodeon", "21":"Toei Animation", "22":"Independant", "23":"Columbia Pictures", "24":"A24", "25":"Apple Studios" };

        let allMovies = [];
        let reviews = {};
        let filteredList = [];
        let displayedMovies = [];
        let currentIndex = 0;

        // 1. Load Reviews
        Papa.parse("Movie List.xlsx - Reviews.csv", {
            download: true, header: false,
            complete: function(res) {
                res.data.forEach(r => { if(r[0]) reviews[r[0].trim().toLowerCase()] = r[1]; });
                loadMainData();
            }
        });

        // 2. Load and Deduplicate Main Data
        function loadMainData() {
            Papa.parse("Movie List.xlsx - Detailed Rankings.csv", {
                download: true, header: true,
                complete: function(results) {
                    let rawData = results.data.filter(row => row.Title || row.Movie);

                    // A. SORT BY DATE DESCENDING (Newest first)
                    rawData.sort((a, b) => new Date(b.Date || 0) - new Date(a.Date || 0));

                    // B. DEDUPLICATE (Keep only the first one found - which is the newest)
                    const uniqueMap = new Map();
                    const years = new Set();

                    rawData.forEach(row => {
                        const title = (row.Title || row.Movie || "").trim();
                        if (!title) return;
                        
                        const key = title.toLowerCase();
                        if (!uniqueMap.has(key)) {
                            uniqueMap.set(key, row);
                            // Extract Year for filter
                            const d = new Date(row.Date);
                            if (!isNaN(d.getFullYear())) years.add(d.getFullYear());
                        }
                    });

                    allMovies = Array.from(uniqueMap.values());
                    
                    // C. POPULATE YEAR FILTER
                    const yearSelect = document.getElementById('yearFilter');
                    Array.from(years).sort((a,b) => b-a).forEach(yr => {
                        const opt = document.createElement('option');
                        opt.value = yr; opt.innerText = yr;
                        yearSelect.appendChild(opt);
                    });

                    applyFilters();
                    setupInfiniteScroll();
                }
            });
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const studio = document.getElementById('studioFilter').value;
            const year = document.getElementById('yearFilter').value;
            const sortVal = document.getElementById('sort').value;

            filteredList = allMovies.filter(m => {
                const title = (m.Title || m.Movie).toLowerCase();
                const mYear = new Date(m.Date).getFullYear().toString();
                
                const matchesSearch = title.includes(term);
                const matchesStudio = (studio === "all" || m.Studio === studio);
                const matchesYear = (year === "all" || mYear === year);
                
                return matchesSearch && matchesStudio && matchesYear;
            });

            // Sorting
            if (sortVal === "high") filteredList.sort((a,b) => (b['Final Rating'] || b.Rating*10) - (a['Final Rating'] || a.Rating*10));
            else if (sortVal === "az") filteredList.sort((a,b) => (a.Title || a.Movie).localeCompare(b.Title || b.Movie));
            else filteredList.sort((a, b) => new Date(b.Date || 0) - new Date(a.Date || 0));

            currentIndex = 0;
            displayedMovies = [];
            document.getElementById('container').innerHTML = "";
            loadNextBatch();
        }

        async function loadNextBatch() {
            const next = filteredList.slice(currentIndex, currentIndex + 12);
            if (next.length === 0) return;
            
            const withPosters = await Promise.all(next.map(async (row) => {
                const poster = await fetchPoster(row.Title || row.Movie);
                return { ...row, poster };
            }));

            displayedMovies = [...displayedMovies, ...withPosters];
            currentIndex += 12;
            render();
        }

        async function fetchPoster(title) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}`, {
                    headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
                });
                const d = await res.json();
                return d.results?.[0] ? `https://image.tmdb.org/t/p/w500${d.results[0].poster_path}` : "https://via.placeholder.com/500x750?text=No+Poster";
            } catch(e) { return "https://via.placeholder.com/500x750?text=Error"; }
        }

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = displayedMovies.map((m, i) => `
                <div class="movie-card" onclick="openModal(${i})">
                    <img src="${m.poster}" loading="lazy">
                    <div class="info">
                        <small style="color:#888">${studioMap[m.Studio] || 'Other'}</small>
                        <h3>${m.Title || m.Movie}</h3>
                        <span class="score-tag">${Math.round(m['Final Rating'] || m.Rating || 0)}/100</span>
                    </div>
                </div>
            `).join('');
        }

        function renderStat(label, val) {
            if(!val || val == 0) return "";
            return `<div><small>${label}: ${val}</small><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${val}%"></div></div></div>`;
        }

        function openModal(i) {
            const m = displayedMovies[i];
            const title = m.Title || m.Movie;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImg').src = m.poster;
            document.getElementById('modalScore').innerText = Math.round(m['Final Rating'] || m.Rating || 0);
            document.getElementById('modalMeta').innerText = `${studioMap[m.Studio] || 'Other'} • ${m.Date}`;
            
            const stats = renderStat("Story", m.Story) + renderStat("Character", m.Character) + renderStat("Visuals", m.Visuals) + renderStat("Pacing", m.Pacing);
            document.getElementById('modalBreakdown').innerHTML = stats || "No breakdown available.";
            
            const revBox = document.getElementById('modalReview');
            const revTxt = reviews[title.trim().toLowerCase()];
            if(revTxt) { revBox.innerText = `"${revTxt}"`; revBox.style.display = 'block'; } 
            else { revBox.style.display = 'none'; }
            
            document.getElementById('movieModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
        
        function setupInfiniteScroll() {
            new IntersectionObserver((entries) => { if(entries[0].isIntersecting) loadNextBatch(); }, {threshold: 0.1}).observe(document.getElementById('sentinel'));
        }

        // Listeners
        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('studioFilter').addEventListener('change', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('sort').addEventListener('change', applyFilters);
        window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); };
    </script>
</body>
</html>
