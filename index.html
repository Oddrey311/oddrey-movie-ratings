<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Rankings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* MAIN STYLES */
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 0; margin: 0; }
        .controls { position: sticky; top: 0; background: #1a1a1a; padding: 20px; z-index: 100; border-bottom: 2px solid #e50914; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 200px; }
        
        /* GRID STYLES */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .movie-card { background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .movie-card:hover { border-color: #e50914; transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .info { padding: 10px; }
        .score-tag { background: #e50914; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 0.85rem; }
        h3 { font-size: 0.95rem; margin: 5px 0 10px 0; height: 2.4em; overflow: hidden; }

        /* MODAL STYLES */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; overflow-y: auto; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 15px; max-width: 900px; width: 90%; display: flex; flex-wrap: wrap; gap: 30px; position: relative; border: 1px solid #444; text-align: left; margin: 20px auto; }
        .modal-left { flex: 0 0 250px; }
        .modal-left img { width: 100%; border-radius: 10px; }
        .modal-right { flex: 1; min-width: 300px; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #888; }
        
        /* STAT BARS */
        .breakdown { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-row { margin-bottom: 8px; }
        .stat-label { font-size: 0.8rem; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 3px; }
        .stat-bar-bg { background: #333; height: 6px; border-radius: 3px; width: 100%; }
        .stat-bar-fill { background: #e50914; height: 100%; border-radius: 3px; transition: width 0.5s ease-out; }
        
        .review-box { margin-top: 25px; padding: 15px; background: #222; border-radius: 8px; border-left: 4px solid #e50914; font-style: italic; color: #ddd; }
        #sentinel { padding: 40px; color: #888; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="search" placeholder="Search titles...">
        <select id="studioFilter">
            <option value="all">All Studios</option>
            </select>
        <select id="sort">
            <option value="recent">Most Recent</option>
            <option value="high">Highest Rated</option>
            <option value="az">A-Z</option>
        </select>
    </div>

    <div id="container" class="movie-grid"></div>
    <div id="sentinel">Scroll for more...</div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <img id="modalImg" src="">
                <div style="margin-top:20px; text-align:center;">
                    <span id="modalScore" style="font-size:2rem; font-weight:bold; color:#e50914;"></span>
                    <div style="font-size:0.8rem; color:#888;">FINAL RATING</div>
                </div>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle" style="margin-top:0;"></h2>
                <p id="modalMeta" style="color:#888; margin-bottom:20px;"></p>
                
                <strong>Rating Breakdown</strong>
                <div class="breakdown" id="modalBreakdown">
                    </div>

                <div id="modalReview" class="review-box" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MzNjZmYyNDFlMzBiNDFiYzdmMTZhZTllYzRkOTdhOSIsIm5iZiI6MTc3NDA2MzY2NC40MDksInN1YiI6IjY5YmUxMDMwZjVkMGNkMmNiODcwODc0MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.6v1eQGdH2fRMCICnH9sbIoVRFpQ2Xy5fgWwbcEL1hII";
        
        const studioMap = { "1":"Marvel", "2":"DC", "3":"Disney", "8":"Warner Bros", "12":"Sony", "17":"Apple" /* etc */ };

        let allMovies = [];
        let reviews = {};
        let displayedMovies = [];
        let currentIndex = 0;

        // 1. LOAD REVIEWS
        Papa.parse("Movie List.xlsx - Reviews.csv", {
            download: true, header: true,
            complete: function(res) {
                res.data.forEach(r => { if(r.Title) reviews[r.Title.trim()] = r.Review; });
                loadMainData();
            }
        });

        // 2. LOAD DETAILED RANKINGS
        function loadMainData() {
            Papa.parse("Movie List.xlsx - Detailed Rankings.csv", {
                download: true, header: true,
                complete: function(results) {
                    let rawData = results.data.filter(row => row.Title); // Note: "Title" column in this file
                    const uniqueMap = new Map();
                    rawData.forEach(row => uniqueMap.set(row.Title.trim(), row));
                    allMovies = Array.from(uniqueMap.values());
                    applyFilters();
                    setupInfiniteScroll();
                }
            });
        }

        function renderStat(label, value) {
            if (!value) return "";
            return `
                <div class="stat-row">
                    <div class="stat-label"><span>${label}</span><span>${value}</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${value}%"></div></div>
                </div>`;
        }

        function openModal(index) {
            const m = displayedMovies[index];
            document.getElementById('modalTitle').innerText = m.Title;
            document.getElementById('modalImg').src = m.poster;
            document.getElementById('modalScore').innerText = Math.round(m['Final Rating']);
            document.getElementById('modalMeta').innerText = `${studioMap[m.Studio] || 'Other'} • Watched on ${m.Date}`;
            
            // Inject Breakdown Stats
            const b = document.getElementById('modalBreakdown');
            b.innerHTML = 
                renderStat("Story", m.Story) + 
                renderStat("Characters", m.Character) +
                renderStat("Performance", m.Performance) +
                renderStat("Genre", m['Genre Fulfilled']) +
                renderStat("Pacing", m.Pacing) +
                renderStat("Visuals", m.Visuals);

            const rev = document.getElementById('modalReview');
            const txt = reviews[m.Title.trim()];
            if (txt) { rev.innerText = `"${txt}"`; rev.style.display = 'block'; }
            else { rev.style.display = 'none'; }

            document.getElementById('movieModal').style.display = 'flex';
        }

        // ... (Keep the applyFilters, fetchPoster, render, and closeModal functions from before)
        // Note: Change 'm.Movie' to 'm.Title' in those functions to match this CSV
        
        function render() {
            container.innerHTML = displayedMovies.map((m, i) => `
                <div class="movie-card" onclick="openModal(${i})">
                    <img src="${m.poster}" loading="lazy">
                    <div class="info">
                        <span class="studio-name">${studioMap[m.Studio] || 'Other'}</span>
                        <h3>${m.Title}</h3>
                        <span class="score-tag">${Math.round(m['Final Rating'])}/100</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadNextBatch() {
            const next = filteredList.slice(currentIndex, currentIndex + 12);
            if (next.length === 0) return;
            const withPosters = await Promise.all(next.map(async (row) => {
                const poster = await fetchPoster(row.Title);
                return { ...row, poster };
            }));
            displayedMovies = [...displayedMovies, ...withPosters];
            currentIndex += 12; render();
        }

        async function fetchPoster(title) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}`, {
                    headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
                });
                const data = await res.json();
                return data.results?.[0] ? `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}` : "https://via.placeholder.com/500x750?text=No+Poster";
            } catch(e) { return "https://via.placeholder.com/500x750?text=Error"; }
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const studio = document.getElementById('studioFilter').value;
            filteredList = allMovies.filter(m => {
                return m.Title.toLowerCase().includes(term) && (studio === "all" || m.Studio === studio);
            });
            if (document.getElementById('sort').value === "high") filteredList.sort((a,b) => b['Final Rating'] - a['Final Rating']);
            if (document.getElementById('sort').value === "az") filteredList.sort((a,b) => a.Title.localeCompare(b.Title));
            currentIndex = 0; displayedMovies = []; container.innerHTML = ""; loadNextBatch();
        }

        function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
        window.onclick = (e) => { if(e.target.id === 'movieModal') closeModal(); };

        function setupInfiniteScroll() {
            new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) loadNextBatch();
            }, { threshold: 0.1 }).observe(document.getElementById('sentinel'));
        }

        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('studioFilter').addEventListener('change', applyFilters);
        document.getElementById('sort').addEventListener('change', applyFilters);
    </script>
</body>
</html>
