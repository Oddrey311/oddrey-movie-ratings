<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oddrey's Movie Ratings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 0; margin: 0; }
        
        /* HEADER & BRANDING */
        header { padding: 40px 20px 30px; background: linear-gradient(to bottom, #1a1a1a, #121212); }
        .header-img { width: 100%; max-width: 600px; height: auto; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h1 { margin: 0; color: #e50914; text-transform: uppercase; letter-spacing: 4px; font-size: 2.8rem; }
        .subtitle { color: #888; margin-top: 10px; font-size: 1.1rem; font-weight: 300; letter-spacing: 1px; }

        /* CONTROLS */
        .controls { position: sticky; top: 0; background: #1a1a1a; padding: 15px; z-index: 100; border-bottom: 2px solid #e50914; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; align-items: center; }
        #statsBar { background: #e50914; padding: 6px 18px; border-radius: 25px; font-size: 0.9rem; color: white; font-weight: bold; min-width: 150px; }
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; width: 170px; outline: none; }
        
        /* GRID */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 25px; }
        .movie-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .movie-card:hover { border-color: #e50914; transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; background: #2a2a2a; }
        .score-badge { position: absolute; top: 10px; right: 10px; background: #e50914; color: white; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; border: 2px solid #121212; }
        .info { padding: 12px; }
        h3 { font-size: 0.95rem; margin: 5px 0; height: 2.4em; overflow: hidden; line-height: 1.2; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; overflow-y: auto; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; max-width: 850px; width: 92%; display: flex; flex-wrap: wrap; gap: 30px; position: relative; border: 1px solid #444; text-align: left; margin: 20px auto; }
        .modal-left { flex: 0 0 250px; text-align: center; }
        .modal-left img { width: 100%; border-radius: 12px; }
        .modal-right { flex: 1; min-width: 300px; }
        .modal-close { position: absolute; top: 15px; right: 25px; font-size: 35px; cursor: pointer; color: #666; }
        .stat-bar-bg { background: #333; height: 6px; border-radius: 3px; margin: 4px 0 10px 0; }
        .stat-bar-fill { background: #e50914; height: 100%; border-radius: 3px; }
        .review-text { margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; border-left: 4px solid #e50914; font-style: italic; color: #ddd; }

        #sentinel { padding: 60px; color: #444; }
    </style>
</head>
<body>

    <header>
        <img src="header.jpg" alt="Cinema Header" class="header-img">
        <h1>Oddrey's Movie Ratings</h1>
        <div class="subtitle">Movies watched at the cinema</div>
    </header>

    <div class="controls">
        <div id="statsBar">Archive Loading...</div>
        <input type="text" id="search" placeholder="Search movies...">
        <select id="yearFilter"><option value="all">All Years</option></select>
        <select id="studioFilter">
            <option value="all">All Studios</option>
            <option value="1">Marvel</option><option value="2">DC</option><option value="3">Disney</option><option value="4">Pixar</option><option value="5">Universal</option><option value="6">Dream Works</option><option value="7">Illumination</option><option value="8">Warner Bros</option><option value="9">New Line Cinema</option><option value="10">Paramount</option><option value="11">Miramax</option><option value="12">Sony Pictures</option><option value="13">MGM</option><option value="14">Lionsgate</option><option value="15">Focus Features</option><option value="16">Lucas film</option><option value="17">20th Century</option><option value="18">Searchlight</option><option value="19">20th Century Fox / Marvel</option><option value="20">Nickelodeon</option><option value="21">Toei Animation</option><option value="22">Independant</option><option value="23">Columbia Pictures</option><option value="24">A24</option><option value="25">Apple Studios</option>
        </select>
        <select id="sort">
            <option value="recent">Most Recent</option>
            <option value="high">Highest Rated</option>
            <option value="az">A-Z</option>
        </select>
    </div>

    <div id="container" class="movie-grid"></div>
    <div id="sentinel">LOADING ARCHIVE...</div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <img id="modalImg" src="">
                <div style="margin-top:20px;">
                    <span id="modalScore" style="font-size: 3.5rem; font-weight: bold; color: #e50914;"></span>
                    <div style="color: #888; letter-spacing: 2px; font-size: 0.8rem;">FINAL RATING</div>
                </div>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle" style="margin-top:0; font-size: 2rem;"></h2>
                <p id="modalMeta" style="color:#888; border-bottom:1px solid #333; padding-bottom:15px;"></p>
                <div id="breakdownSection">
                    <strong style="font-size:0.8rem; color:#e50914; text-transform:uppercase;">Score Breakdown</strong>
                    <div id="modalBreakdown" style="margin-top:10px; display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px;"></div>
                </div>
                <div id="modalReview" class="review-text" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MzNjZmYyNDFlMzBiNDFiYzdmMTZhZTllYzRkOTdhOSIsIm5iZiI6MTc3NDA2MzY2NC40MDksInN1YiI6IjY5YmUxMDMwZjVkMGNkMmNiODcwODc0MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.6v1eQGdH2fRMCICnH9sbIoVRFpQ2Xy5fgWwbcEL1hII";
        const studioMap = { "1":"Marvel", "2":"DC", "3":"Disney", "4":"Pixar", "5":"Universal", "6":"Dream Works", "7":"Illumination", "8":"Warner Bros", "9":"New Line Cinema", "10":"Paramount", "11":"Miramax", "12":"Sony Pictures", "13":"MGM", "14":"Lionsgate", "15":"Focus Features", "16":"Lucas film", "17":"20th Century", "18":"Searchlight", "19":"20th Century Fox / Marvel", "20":"Nickelodeon", "21":"Toei Animation", "22":"Independant", "23":"Columbia Pictures", "24":"A24", "25":"Apple Studios" };

        let allMovies = [];
        let reviews = {};
        let filteredList = [];
        let displayedMovies = [];
        let currentIndex = 0;

        // STEP 1: LOAD REVIEWS
        Papa.parse("Movie List.xlsx - Reviews.csv", {
            download: true, header: false, skipEmptyLines: true,
            complete: function(res) {
                res.data.forEach(r => { if(r[0]) reviews[r[0].trim().toLowerCase()] = r[1]; });
                loadMovieData();
            },
            error: () => loadMovieData()
        });

        // STEP 2: LOAD MAIN DATA (Strictly one sheet now)
        function loadMovieData() {
            Papa.parse("Movie List.xlsx - Data.csv", {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    let rawData = results.data.filter(row => row.Movie);

                    // Ensure most recent entries are at the top before we deduplicate
                    rawData.sort((a, b) => new Date(b.Date || 0) - new Date(a.Date || 0));

                    const uniqueMap = new Map();
                    const years = new Set();

                    rawData.forEach(row => {
                        const title = row.Movie.trim();
                        if (!title) return;

                        // Create an "Ultra-Clean Key" to prevent duplicates
                        // This removes spaces and punctuation so "Inception " and "Inception" match.
                        const cleanKey = title.toLowerCase().replace(/[^a-z0-9]/g, "");

                        if (!uniqueMap.has(cleanKey)) {
                            uniqueMap.set(cleanKey, row);
                            const d = new Date(row.Date);
                            if (!isNaN(d.getFullYear())) years.add(d.getFullYear());
                        }
                    });

                    allMovies = Array.from(uniqueMap.values());
                    
                    // Fill the Year Dropdown
                    const yrSel = document.getElementById('yearFilter');
                    Array.from(years).sort((a,b) => b-a).forEach(yr => {
                        const opt = document.createElement('option');
                        opt.value = yr; opt.innerText = yr; yrSel.appendChild(opt);
                    });

                    applyFilters();
                    setupInfiniteScroll();
                }
            });
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const studio = document.getElementById('studioFilter').value;
            const year = document.getElementById('yearFilter').value;
            const sortVal = document.getElementById('sort').value;

            filteredList = allMovies.filter(m => {
                const title = m.Movie.toLowerCase();
                const mYear = new Date(m.Date).getFullYear().toString();
                return title.includes(term) && 
                       (studio === "all" || m.Studio == studio) && 
                       (year === "all" || mYear === year);
            });

            document.getElementById('statsBar').innerText = `${filteredList.length} Unique Movies`;

            // Sort logic
            if (sortVal === "high") filteredList.sort((a,b) => (b.Rating || 0) - (a.Rating || 0));
            else if (sortVal === "az") filteredList.sort((a,b) => a.Movie.localeCompare(b.Movie));
            else filteredList.sort((a, b) => new Date(b.Date || 0) - new Date(a.Date || 0));

            currentIndex = 0; displayedMovies = []; document.getElementById('container').innerHTML = ""; loadNextBatch();
        }

        async function loadNextBatch() {
            const next = filteredList.slice(currentIndex, currentIndex + 12);
            if (next.length === 0) { document.getElementById('sentinel').innerText = "END OF ARCHIVE"; return; }
            
            const withPosters = await Promise.all(next.map(async (row) => {
                const poster = await fetchPoster(row.Movie, row.Date, row.tmdb_id);
                return { ...row, poster };
            }));

            displayedMovies = [...displayedMovies, ...withPosters];
            currentIndex += 12; render();
        }

        async function fetchPoster(title, dateStr, tmdbId) {
            try {
                if (tmdbId && tmdbId.trim() !== "" && !isNaN(tmdbId)) {
                    const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId.trim()}`, {
                        headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
                    });
                    const d = await res.json();
                    return d.poster_path ? `https://image.tmdb.org/p/w500${d.poster_path}` : "https://via.placeholder.com/500x750?text=No+Poster";
                }
                let url = `https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}`;
                const year = new Date(dateStr).getFullYear();
                if (!isNaN(year)) url += `&primary_release_year=${year}`;
                const response = await fetch(url, { headers: { Authorization: `Bearer ${TMDB_TOKEN}` } });
                const data = await response.json();
                return data.results?.[0] ? `https://image.tmdb.org/p/w500${data.results[0].poster_path}` : "https://via.placeholder.com/500x750?text=No+Poster";
            } catch(e) { return "https://via.placeholder.com/500x750?text=Error"; }
        }

        function render() {
            document.getElementById('container').innerHTML = displayedMovies.map((m, i) => `
                <div class="movie-card" onclick="openModal(${i})">
                    <div class="score-badge">${Math.round(m.Rating || 0)}</div>
                    <img src="${m.poster}" loading="lazy">
                    <div class="info">
                        <small style="color:#666; font-weight:bold;">${studioMap[m.Studio] || 'Other'}</small>
                        <h3>${m.Movie}</h3>
                    </div>
                </div>`).join('');
        }

        function renderStat(label, val) {
            // This is the "Lazy" logic: hide bars if data is missing or zero
            if(!val || val == 0 || val === "" || val === " ") return "";
            return `<div><div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#888; text-transform:uppercase;"><span>${label}</span><span>${val}</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${val}%"></div></div></div>`;
        }

        function openModal(i) {
            const m = displayedMovies[i];
            const title = m.Movie;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImg').src = m.poster;
            document.getElementById('modalScore').innerText = Math.round(m.Rating || 0);
            document.getElementById('modalMeta').innerText = `${studioMap[m.Studio] || 'Other'} • Watched: ${m.Date}`;
            
            // Build the stats list
            const stats = 
                renderStat("Story", m.Story) + 
                renderStat("Character", m.Character) + 
                renderStat("Visuals", m.Visuals) + 
                renderStat("Performance", m.Performance) + 
                renderStat("Pacing", m.Pacing) +
                renderStat("Genre", m['Genre Fulfilled']);

            const breakdown = document.getElementById('modalBreakdown');
            if (stats === "") {
                document.getElementById('breakdownSection').style.display = 'none';
            } else {
                document.getElementById('breakdownSection').style.display = 'block';
                breakdown.innerHTML = stats;
            }
            
            const revBox = document.getElementById('modalReview');
            const revTxt = reviews[title.trim().toLowerCase()];
            if(revTxt) { revBox.innerText = `"${revTxt}"`; revBox.style.display = 'block'; } else { revBox.style.display = 'none'; }
            
            document.getElementById('movieModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
        window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); };
        function setupInfiniteScroll() {
            new IntersectionObserver((entries) => { if(entries[0].isIntersecting) loadNextBatch(); }, {threshold: 0.1}).observe(document.getElementById('sentinel'));
        }

        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('studioFilter').addEventListener('change', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('sort').addEventListener('change', applyFilters);
    </script>
</body>
</html>
