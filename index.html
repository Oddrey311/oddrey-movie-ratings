<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Rankings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* THE DESIGN */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; margin: 0; }
        h1 { margin-top: 40px; color: #e50914; text-transform: uppercase; letter-spacing: 2px; }
        
        .controls { position: sticky; top: 0; background: #121212; padding: 20px; z-index: 100; border-bottom: 1px solid #333; margin-bottom: 30px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; margin: 10px; width: 250px; outline: none; }
        input:focus { border-color: #e50914; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 0 20px; }
        .movie-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .movie-card:hover { transform: scale(1.03); border-color: #e50914; }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; background: #2a2a2a; }
        
        .info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .score-tag { background: #e50914; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; align-self: center; }
        h3 { font-size: 1rem; margin: 10px 0; min-height: 2.4em; }

        #sentinel { height: 50px; margin-top: 20px; display: flex; justify-content: center; align-items: center; }
        .loader-text { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>🎬 My Movie Gallery</h1>
        <input type="text" id="search" placeholder="Search your rankings...">
        <select id="sort">
            <option value="recent">Most Recent (Default)</option>
            <option value="high">Highest Rated</option>
            <option value="az">A-Z</option>
        </select>
    </div>

    <div id="container" class="movie-grid"></div>
    
    <div id="sentinel">
        <span class="loader-text" id="loaderMsg">Scroll down to load more...</span>
    </div>

    <script>
        const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MzNjZmYyNDFlMzBiNDFiYzdmMTZhZTllYzRkOTdhOSIsIm5iZiI6MTc3NDA2MzY2NC40MDksInN1YiI6IjY5YmUxMDMwZjVkMGNkMmNiODcwODc0MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.6v1eQGdH2fRMCICnH9sbIoVRFpQ2Xy5fgWwbcEL1hII"; 
        
        let allMovieData = []; 
        let displayedMovies = []; 
        let currentIndex = 0; 
        const batchSize = 10;
        let isSearching = false;

        const container = document.getElementById('container');
        const loaderMsg = document.getElementById('loaderMsg');

        // 1. Fetch CSV and Start
        Papa.parse("Movie list - Sheet1.csv", {
            download: true,
            header: true,
            complete: function(results) {
                // Filter rows that have a movie title
                allMovieData = results.data.filter(row => row.Movie && row.Movie.trim() !== "");
                setupInfiniteScroll();
            }
        });

        // 2. Setup Infinite Scroll (The Intersection Observer)
        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isSearching) {
                    loadNextBatch();
                }
            }, { threshold: 0.1 });

            observer.observe(document.getElementById('sentinel'));
        }

        // 3. Load logic
        async function loadNextBatch() {
            if (currentIndex >= allMovieData.length) {
                loaderMsg.innerText = "You've reached the end of the list!";
                return;
            }

            loaderMsg.innerText = "Loading more posters...";
            
            const nextBatch = allMovieData.slice(currentIndex, currentIndex + batchSize);
            const loadedWithPosters = await Promise.all(nextBatch.map(async (row) => {
                const poster = await fetchPosterFromTMDB(row.Movie);
                return { ...row, poster };
            }));

            displayedMovies = [...displayedMovies, ...loadedWithPosters];
            currentIndex += batchSize;
            renderGallery(displayedMovies);
            loaderMsg.innerText = "Scroll for more";
        }

        async function fetchPosterFromTMDB(title) {
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}`, {
                    headers: { 
                        Authorization: `Bearer ${TMDB_TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                return data.results?.[0] ? `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}` : "https://via.placeholder.com/500x750?text=No+Poster";
            } catch (err) { 
                return "https://via.placeholder.com/500x750?text=Error"; 
            }
        }

        function renderGallery(data) {
            container.innerHTML = data.map(m => `
                <div class="movie-card">
                    <img src="${m.poster}" alt="${m.Movie}" loading="lazy">
                    <div class="info">
                        <h3>${m.Movie}</h3>
                        <span class="score-tag">${m.Rating ? m.Rating * 10 : '??'}/100</span>
                    </div>
                </div>
            `).join('');
        }

        // 4. Search and Sort Logic
        document.getElementById('search').addEventListener('input', async (e) => {
            const term = e.target.value.toLowerCase();
            if (term === "") {
                isSearching = false;
                renderGallery(displayedMovies);
                return;
            }

            isSearching = true;
            loaderMsg.innerText = "Searching entire list...";
            
            const filtered = allMovieData.filter(m => m.Movie.toLowerCase().includes(term)).slice(0, 15);
            const searchWithPosters = await Promise.all(filtered.map(async (row) => {
                const poster = await fetchPosterFromTMDB(row.Movie);
                return { ...row, poster };
            }));
            
            renderGallery(searchWithPosters);
            loaderMsg.innerText = "Showing top search results";
        });

        document.getElementById('sort').addEventListener('change', (e) => {
            if (e.target.value === "high") {
                allMovieData.sort((a,b) => b.Rating - a.Rating);
            } else if (e.target.value === "az") {
                allMovieData.sort((a,b) => a.Movie.localeCompare(b.Movie));
            }
            // Reset and re-load
            currentIndex = 0;
            displayedMovies = [];
            container.innerHTML = "";
            loadNextBatch();
        });
    </script>
</body>
</html>
