<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oddrey's Movie Ratings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* BASE & THEME */
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 0; margin: 0; -webkit-font-smoothing: antialiased; }
        
        /* HEADER */
        header { padding: 40px 20px 30px; background: linear-gradient(to bottom, #1a1a1a, #0f0f0f); }
        .header-img { width: 100%; max-width: 450px; height: auto; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #333; }
        h1 { margin: 0; color: #e50914; text-transform: uppercase; letter-spacing: 4px; font-size: 2.2rem; }
        .subtitle { color: #888; margin-top: 10px; font-size: 1rem; font-weight: 300; letter-spacing: 1px; }

        /* CONTROLS AREA */
        .controls { position: sticky; top: 0; background: #1a1a1a; padding: 15px; z-index: 100; border-bottom: 2px solid #e50914; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #statsBar { background: #222; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; color: #e50914; font-weight: bold; border: 1px solid #333; margin-bottom: 5px; width: fit-content; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none; font-size: 0.9rem; transition: 0.2s; }
        #search { width: 280px; }
        input:focus { border-color: #e50914; }
        
        /* GRID SYSTEM */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; padding: 20px; }
        .movie-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .movie-card:hover { border-color: #e50914; transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.6); }
        .movie-card img { width: 100%; height: 270px; object-fit: cover; background: #222; display: block; }
        
        /* HEAT MAP BARS */
        .rating-bar-container { width: 100%; height: 6px; background: #333; }
        .rating-bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .info { padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .score-text { font-weight: 800; font-size: 1.6rem; line-height: 1; margin-top: 5px; }
        h3 { font-size: 0.95rem; margin: 3px 0; height: 2.4em; overflow: hidden; line-height: 1.2; color: #fff; font-weight: 600; }
        small { color: #888; text-transform: uppercase; font-weight: bold; font-size: 0.6rem; letter-spacing: 1px; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); justify-content: center; align-items: center; overflow-y: auto; padding-top: 40px; }
        .modal-content { background: #161616; padding: 30px; border-radius: 24px; max-width: 850px; width: 90%; display: flex; flex-direction: row; gap: 35px; position: relative; border: 1px solid #333; text-align: left; margin: auto; }
        .modal-left { flex: 0 0 260px; text-align: center; }
        .modal-left img { width: 100%; border-radius: 15px; }
        .modal-right { flex: 1; min-width: 280px; }
        .modal-close { position: absolute; top: -20px; right: -20px; font-size: 26px; cursor: pointer; color: white; background: #e50914; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }

        /* NEW MODAL ELEMENTS */
        .content-rating { background: #333; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; margin-right: 10px; border: 1px solid #444; }
        .cast-list { margin-top: 15px; font-size: 0.9rem; color: #aaa; line-height: 1.4; }
        .cast-label { color: #e50914; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .production-logos { display: flex; gap: 15px; margin-top: 20px; align-items: center; flex-wrap: wrap; opacity: 0.7; }
        .production-logos img { height: 25px; filter: brightness(0) invert(1); }

        .detail-bar-bg { background: #333; height: 7px; border-radius: 4px; margin: 6px 0 12px 0; }
        .detail-bar-fill { height: 100%; border-radius: 4px; }
        .review-text { margin-top: 20px; padding: 20px; background: #1f1f1f; border-radius: 12px; border-left: 5px solid #e50914; font-style: italic; color: #ccc; font-size: 1rem; line-height: 1.6; }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; width: 88%; padding: 25px; }
            .modal-left { flex: 0 0 auto; width: 100%; }
            .modal-left img { max-width: 200px; }
            .modal-close { top: 10px; right: 10px; width: 40px; height: 40px; }
            #search { width: 100%; }
        }
        #sentinel { padding: 80px; color: #444; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="header.jpg" alt="Oddrey's Cinema" class="header-img">
        <h1>Oddrey's Movie Ratings</h1>
        <div class="subtitle">Movies watched at the cinema</div>
    </header>

    <div class="controls">
        <div id="statsBar">Syncing...</div>
        <input type="search" id="search" placeholder="Search title or genre...">
        <select id="genreFilter"><option value="all">All Genres</option></select>
        <select id="yearFilter"><option value="all">All Years</option></select>
        <select id="sort">
            <option value="recent">Most Recent</option>
            <option value="high">Highest Rated</option>
            <option value="worst">Worst Rated</option>
            <option value="az">A-Z</option>
        </select>
    </div>

    <div id="container" class="movie-grid"></div>
    <div id="sentinel">LOADING ARCHIVE</div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <img id="modalImg" src="">
                <div style="margin-top:20px;"><span id="modalScore" style="font-size: 4.5rem; font-weight: 800;"></span></div>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle" style="margin:0;"></h2>
                <div style="margin-top:5px; margin-bottom:15px;">
                    <span id="modalCert" class="content-rating"></span>
                    <span id="modalMeta" style="color:#888; font-size: 0.95rem;"></span>
                </div>
                
                <div id="modalCast" class="cast-list"></div>

                <div id="breakdownSection" style="margin-top:20px;">
                    <strong style="font-size:0.75rem; color:#e50914; text-transform:uppercase;">Score Breakdown</strong>
                    <div id="modalBreakdown" style="margin-top:10px; display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px;"></div>
                </div>
                <div id="modalReview" class="review-text" style="display:none;"></div>
                
                <div id="modalProduction" class="production-logos"></div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MzNjZmYyNDFlMzBiNDFiYzdmMTZhZTllYzRkOTdhOSIsIm5iZiI6MTc3NDA2MzY2NC40MDksInN1YiI6IjY5YmUxMDMwZjVkMGNkMmNiODcwODc0MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.6v1eQGdH2fRMCICnH9sbIoVRFpQ2Xy5fgWwbcEL1hII";
        const studioMap = { "1":"Marvel", "2":"DC", "3":"Disney", "4":"Pixar", "5":"Universal", "6":"Dream Works", "8":"Warner Bros", "10":"Paramount", "12":"Sony Pictures", "19":"20th Century Studios", "24":"A24", "25":"Apple Studios" };
        const genreIdMap = { 28: "Action", 12: "Adventure", 16: "Animation", 35: "Comedy", 80: "Crime", 99: "Documentary", 18: "Drama", 10751: "Family", 14: "Fantasy", 36: "History", 27: "Horror", 10402: "Music", 9648: "Mystery", 10749: "Romance", 878: "Sci-Fi", 53: "Thriller", 10752: "War", 37: "Western" };

        let allMovies = [];
        let reviews = {};
        let filteredList = [];
        let displayedMovies = [];
        let currentIndex = 0;
        let isLoading = false;

        function getRatingColor(score) {
            if (score >= 95) return "#d500f9"; if (score >= 90) return "#00b0ff"; if (score >= 80) return "#00c853"; 
            if (score >= 70) return "#ffea00"; if (score >= 60) return "#ff9100"; if (score >= 40) return "#ff3d00"; 
            if (score >= 20) return "#d50000"; return "#5d4037";
        }

        Papa.parse("Movie List.xlsx - Reviews.csv", {
            download: true, header: false, skipEmptyLines: true,
            complete: function(res) {
                res.data.forEach(r => { if(r[0]) reviews[r[0].trim().toLowerCase()] = r[1]; });
                loadMovieData();
            },
            error: () => loadMovieData()
        });

        function loadMovieData() {
            Papa.parse("Movie List.xlsx - Data.csv", {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    let data = results.data.filter(row => row.Movie);
                    data.sort((a, b) => new Date(b.Date || 0) - new Date(a.Date || 0));
                    const uniqueMap = new Map();
                    const years = new Set();
                    data.forEach(row => {
                        const title = row.Movie.trim();
                        const key = title.toLowerCase().replace(/[^a-z0-9]/g, "");
                        if (!uniqueMap.has(key)) {
                            uniqueMap.set(key, row);
                            const d = new Date(row.Date);
                            if (!isNaN(d.getFullYear())) years.add(d.getFullYear());
                        }
                    });
                    allMovies = Array.from(uniqueMap.values());
                    const yrSel = document.getElementById('yearFilter');
                    Array.from(years).sort((a,b) => b-a).forEach(yr => {
                        const opt = document.createElement('option'); opt.value = yr; opt.innerText = yr; yrSel.appendChild(opt);
                    });
                    applyFilters();
                    setupInfiniteScroll();
                }
            });
        }

        function applyFilters() {
            const term = document.getElementById('search').value.toLowerCase();
            const sortVal = document.getElementById('sort').value;
            const year = document.getElementById('yearFilter').value;

            filteredList = allMovies.filter(m => {
                const title = m.Movie.toLowerCase();
                const mYear = new Date(m.Date).getFullYear().toString();
                return title.includes(term) && (year === "all" || mYear === year);
            });

            if (sortVal === "high") filteredList.sort((a,b) => (b.Rating || 0) - (a.Rating || 0));
            else if (sortVal === "worst") filteredList.sort((a,b) => (a.Rating || 0) - (b.Rating || 0));
            else if (sortVal === "az") filteredList.sort((a,b) => a.Movie.localeCompare(b.Movie));
            else filteredList.sort((a, b) => new Date(b.Date || 0) - new Date(a.Date || 0));

            currentIndex = 0; displayedMovies = []; document.getElementById('container').innerHTML = "";
            document.getElementById('statsBar').innerText = `${filteredList.length} Movies`;
            loadNextBatch();
        }

        async function loadNextBatch() {
            if (isLoading) return;
            const nextBatch = filteredList.slice(currentIndex, currentIndex + 12);
            if (nextBatch.length === 0) return;
            isLoading = true;
            const enriched = await Promise.all(nextBatch.map(async (row) => {
                const extras = await fetchBasicExtras(row.Movie, row.Date, row.tmdb_id);
                return { ...row, ...extras };
            }));
            displayedMovies = [...displayedMovies, ...enriched];
            currentIndex += 12; render();
            isLoading = false;
        }

        async function fetchBasicExtras(title, dateStr, tmdbId) {
            try {
                const headers = { Authorization: `Bearer ${TMDB_TOKEN}` };
                let result = null;
                if (tmdbId && tmdbId.toString().trim() !== "") {
                    const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId.toString().trim()}`, { headers });
                    result = await res.json();
                } else {
                    const year = new Date(dateStr).getFullYear();
                    let url = `https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}`;
                    if (!isNaN(year)) url += `&primary_release_year=${year}`;
                    let response = await fetch(url, { headers });
                    let data = await response.json();
                    result = data.results?.[0];
                }
                if (result) {
                    const poster = result.poster_path ? `https://image.tmdb.org/t/p/w500${result.poster_path}` : "https://via.placeholder.com/500x750";
                    const genres = result.genre_ids ? result.genre_ids.map(id => genreIdMap[id]).filter(n => n).slice(0, 2).join(", ") : "";
                    return { poster, genres, tmdb_actual_id: result.id };
                }
                return { poster: "https://via.placeholder.com/500x750", genres: "", tmdb_actual_id: null };
            } catch(e) { return { poster: "https://via.placeholder.com/500x750", genres: "", tmdb_actual_id: null }; }
        }

        async function openModal(i) {
            const m = displayedMovies[i];
            const color = getRatingColor(m.Rating);
            
            // Setup Modal Basics
            document.getElementById('modalTitle').innerText = m.Movie;
            document.getElementById('modalImg').src = m.poster;
            document.getElementById('modalScore').innerText = Math.round(m.Rating || 0);
            document.getElementById('modalScore').style.color = color;
            document.getElementById('modalMeta').innerText = `Loading details...`;
            document.getElementById('modalCast').innerHTML = "";
            document.getElementById('modalProduction').innerHTML = "";
            document.getElementById('modalCert').innerText = "-";
            
            document.getElementById('movieModal').style.display = 'flex';

            // Fetch Deep Details
            if (m.tmdb_actual_id) {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${m.tmdb_actual_id}?append_to_response=credits,release_dates`, {
                    headers: { Authorization: `Bearer ${TMDB_TOKEN}` }
                });
                const data = await res.json();
                
                // 1. Content Rating (US Certification)
                const release = data.release_dates.results.find(r => r.iso_3166_1 === "US");
                const cert = release ? release.release_dates[0].certification : "NR";
                document.getElementById('modalCert').innerText = cert || "G";

                // 2. Cast (Top 5)
                const cast = data.credits.cast.slice(0, 5).map(c => c.name).join(", ");
                document.getElementById('modalCast').innerHTML = `<span class="cast-label">Top Billed Cast</span>${cast}`;

                // 3. Meta update
                document.getElementById('modalMeta').innerText = `${m.genres ? m.genres + ' • ' : ''}${studioMap[m.Studio] || 'Cinema'} • ${m.Date}`;

                // 4. Production Logos
                const logos = data.production_companies.filter(c => c.logo_path).slice(0, 3).map(c => 
                    `<img src="https://image.tmdb.org/t/p/w200${c.logo_path}" title="${c.name}">`
                ).join("");
                document.getElementById('modalProduction').innerHTML = logos;
            }

            const stats = renderStat("Story", m.Story) + renderStat("Character", m.Character) + renderStat("Visuals", m.Visuals) + renderStat("Performance", m.Performance) + renderStat("Pacing", m.Pacing);
            document.getElementById('modalBreakdown').innerHTML = stats || "No stats available.";
            
            const revBox = document.getElementById('modalReview');
            const revTxt = reviews[m.Movie.trim().toLowerCase()];
            if(revTxt) { revBox.innerText = `"${revTxt}"`; revBox.style.display = 'block'; } else { revBox.style.display = 'none'; }
        }

        function render() {
            document.getElementById('container').innerHTML = displayedMovies.map((m, i) => {
                const score = Math.round(m.Rating || 0);
                const barColor = getRatingColor(score);
                return `
                <div class="movie-card" onclick="openModal(${i})">
                    <img src="${m.poster}" loading="lazy">
                    <div class="rating-bar-container"><div class="rating-bar-fill" style="width:${score}%; background:${barColor};"></div></div>
                    <div class="info">
                        <small>${studioMap[m.Studio] || 'Other'}</small>
                        <h3>${m.Movie}</h3>
                        <span class="score-text" style="color:${barColor}">${score}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderStat(label, val) {
            if(!val || val == 0) return "";
            return `<div><div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#888;"><span>${label}</span><span>${val}</span></div><div class="detail-bar-bg"><div class="detail-bar-fill" style="width:${val}%; background:${getRatingColor(val)}"></div></div></div>`;
        }

        function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
        window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); };
        function setupInfiniteScroll() { new IntersectionObserver((entries) => { if(entries[0].isIntersecting && !isLoading) loadNextBatch(); }, {threshold: 0.1}).observe(document.getElementById('sentinel')); }
        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('sort').addEventListener('change', applyFilters);
    </script>
</body>
</html>
