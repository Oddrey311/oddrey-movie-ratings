<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Rankings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .controls { margin-bottom: 30px; }
        input, select { padding: 12px; border-radius: 8px; border: none; margin: 10px; width: 250px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .movie-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .movie-card:hover { transform: translateY(-5px); border-color: #e50914; }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; background: #2a2a2a; }
        .info { padding: 15px; }
        .score-tag { background: #e50914; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        h3 { font-size: 1rem; margin: 10px 0; height: 2.5em; overflow: hidden; }
    </style>
</head>
<body>

    <h1>🎬 My Movie Gallery</h1>
    <div class="controls">
        <input type="text" id="search" placeholder="Search your rankings...">
        <select id="sort">
            <option value="recent">Most Recent</option>
            <option value="high">Highest Rated</option>
            <option value="az">A-Z</option>
        </select>
    </div>

    <div id="container" class="movie-grid">Loading your movies...</div>

    <script>
        // PASTE YOUR TMDB API KEY HERE
        const TMDB_API_KEY = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MzNjZmYyNDFlMzBiNDFiYzdmMTZhZTllYzRkOTdhOSIsIm5iZiI6MTc3NDA2MzY2NC40MDksInN1YiI6IjY5YmUxMDMwZjVkMGNkMmNiODcwODc0MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.6v1eQGdH2fRMCICnH9sbIoVRFpQ2Xy5fgWwbcEL1hII"; 
        
        let allMovies = [];

        // 1. Load the Spreadsheet
        Papa.parse("Movie list - Sheet1.csv", {
            download: true,
            header: true,
            complete: async function(results) {
                // Filter out any empty rows
                const rawData = results.data.filter(row => row.Movie);
                
                // 2. Fetch posters for each movie
                allMovies = await Promise.all(rawData.map(async (row) => {
                    const poster = await fetchPoster(row.Movie);
                    return { ...row, poster };
                }));

                displayMovies(allMovies);
            }
        });

        // 3. The API Fetcher Function
        async function fetchPoster(title) {
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}`, {
                    headers: { Authorization: `Bearer ${TMDB_API_KEY}` }
                });
                const data = await response.json();
                if (data.results && data.results[0]) {
                    return `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                }
            } catch (err) { console.error(err); }
            return "https://via.placeholder.com/500x750?text=No+Poster";
        }

        function displayMovies(data) {
            const container = document.getElementById('container');
            container.innerHTML = data.map(m => `
                <div class="movie-card">
                    <img src="${m.poster}" alt="${m.Movie}">
                    <div class="info">
                        <h3>${m.Movie}</h3>
                        <span class="score-tag">${m.Rating * 10}/100</span>
                        <p style="font-size: 0.8rem; color: #888;">${m.Studio || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        // 4. Search & Sort Logic
        document.getElementById('search').addEventListener('input', (e) => {
            const filtered = allMovies.filter(m => m.Movie.toLowerCase().includes(e.target.value.toLowerCase()));
            displayMovies(filtered);
        });

        document.getElementById('sort').addEventListener('change', (e) => {
            let sorted = [...allMovies];
            if (e.target.value === "high") sorted.sort((a,b) => b.Rating - a.Rating);
            if (e.target.value === "az") sorted.sort((a,b) => a.Movie.localeCompare(b.Movie));
            displayMovies(sorted);
        });
    </script>
</body>
</html>
